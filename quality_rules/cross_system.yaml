version: 1
description: "Cross-system contracts between C++ rithmic_engine and Python live_trader for MNQ ORB trading"

known_bugs:
  - id: BUG-7
    severity: P0
    name: daily_loss_limit_key_mismatch
    description: "C++ reads flat 'daily_loss_limit' key; live_config.json only had it nested under prop_firm — C++ always used -1000.0 default"
    source_file: "src/execution/orb_config.hpp"
    source_line: "c.daily_loss_limit = json_dbl(text, \"daily_loss_limit\", -1000.0);"
    config_file: "config/live_config.json"
    impact: "C++ executor halted trading $1000 too early every session — actual Legends limit is $2000"
    fix_applied: "Added flat key 'daily_loss_limit': -2000.0 to live_config.json (negative = threshold). prop_firm.daily_loss_limit: 2000.0 kept for go_live.py gate I (Python reads positive magnitude)."
    status: FIXED

  - id: BUG-8
    severity: P0
    name: stop_loss_ticks_cpp_python_mismatch
    description: "C++ sl_points=15.0 (60 ticks) vs Python stop_loss_ticks=16 (4.0 points) — 3.75x mismatch in stop-loss distance"
    cpp:
      source: "src/execution/orb_config.hpp"
      key: "sl_points"
      value: 15.0
      ticks_equivalent: 60
      risk_per_trade_usd: 30.0  # 15 points * $2/point
    python:
      source: "config/live_config.json → orb.stop_loss_ticks"
      old_value: 16
      old_points: 4.0
      old_risk_per_trade_usd: 8.0  # 4 points * $2/point
      new_value: 60
      new_points: 15.0
      new_risk_per_trade_usd: 30.0  # aligned with C++
    fix_applied: "Changed live_config.json orb.stop_loss_ticks from 16 to 60 (= sl_points 15.0 / tick_size 0.25)"
    status: FIXED

  - id: BUG-9
    severity: INFO
    name: exit_target_cpp_python_architectural_difference
    description: "C++ executor has no fixed target exit — uses trailing stop only. Python MicroORBStrategy exits at target_ticks=48 (12 points). This is an intentional architectural difference."
    cpp:
      source: "src/execution/orb_strategy.cpp"
      behavior: "No fixed target — relies on trailing stop (trail_step=10.0 points) to capture profits"
    python:
      source: "config/live_config.json → orb.target_ticks"
      value: 48
      points_equivalent: 12.0
      behavior: "Exits when price reaches entry + 12 points (long) or entry - 12 points (short)"
    impact: "Python may exit at 12-point profit while C++ continues trailing. On same signal, outcomes can diverge significantly."
    resolution: "INTENTIONAL — document and monitor. C++ trailing approach is preferred for live execution; Python target is a safety valve in paper trading mode."
    status: DOCUMENTED

  - id: CPP-BUG-001
    severity: HIGH
    name: nq_tick_value_wrong_for_mnq
    description: "NQ_TICK_VALUE = 5.0 in orb_config.hpp is correct for NQ but WRONG for MNQ (should be 0.50)"
    source_file: "src/execution/orb_config.hpp"
    source_line: "inline constexpr double NQ_TICK_VALUE = 5.0;"
    impact: "10x inflated slippage_usd in latency logger — $5.00 reported per tick instead of $0.50"
    fix: "Added MNQ_TICK_VALUE = 0.50 constant; latency_logger.hpp updated to use MNQ_TICK_VALUE"
    status: FIXED  # 2026-04-28

  - id: CPP-BUG-002
    severity: LOW
    name: executor_comment_wrong_contract
    description: "executor_main.cpp comment says 'NQ: $20/point' — wrong for MNQ ($2/point)"
    source_file: "src/execution/executor_main.cpp"
    impact: "Documentation only — misleads developers about contract spec"
    fix: "Updated comment and flush_position() to use point_value parameter instead of hardcoded 20.0"
    status: FIXED  # 2026-04-28

  - id: BUG-14
    severity: P0
    name: trade_route_simulator_in_live_config
    description: "live_config.json had trade_route='simulator' — C++ executor passes this to Rithmic set_trade_route(); simulator routes all orders to Rithmic paper system even with dry_run=False"
    source_file: "config/live_config.json"
    cpp_reader: "src/execution/orb_config.hpp line 196: c.trade_route = json_str(text, 'trade_route', ...)"
    impact: "SILENT PAPER TRADING IN LIVE MODE — orders appear to submit but go to simulator; no real fills possible"
    fix: "Changed trade_route from 'simulator' to 'Rithmic Order Routing' in live_config.json"
    status: FIXED  # 2026-04-28

  - id: BUG-15
    severity: P1
    name: risk_params_flat_keys_missing
    description: "trailing_drawdown_cap and consistency_cap_pct were missing as flat keys — C++ risk_manager.hpp uses orb_config.hpp defaults (2500.0 and 0.30) without any config binding"
    cpp_reader: "src/execution/orb_config.hpp lines 184-185"
    config_file: "config/live_config.json"
    impact: "Risk parameters silently invisible in config — any prop firm rule change would not propagate to C++ executor"
    fix: "Added flat keys trailing_drawdown_cap=2500.0 and consistency_cap_pct=0.30 to live_config.json"
    status: FIXED  # 2026-04-28

  - id: BUG-16
    severity: P1
    name: max_daily_trades_flat_exceeds_prop_firm
    description: "Flat max_daily_trades=5 (C++ reads) exceeded prop_firm.max_daily_trades=3 (Legends limit) — C++ would allow 4th and 5th trade, violating prop firm consistency rules"
    cpp_reader: "src/execution/orb_config.hpp line 177"
    config_file: "config/live_config.json"
    impact: "C++ executor could take trades 4+5 in a session, breaching Legends 50K rules and risking account termination"
    fix: "Changed flat max_daily_trades from 5 to 3 to match prop_firm.max_daily_trades"
    status: FIXED  # 2026-04-28

  - id: PY-BUG-001
    severity: HIGH
    name: micro_orb_default_point_value_wrong
    description: "strategy/micro_orb.py docstring example shows point_value: 20.0 — wrong for MNQ (must be 2.0)"
    source_file: "strategy/micro_orb.py"
    source_line: "\"point_value\": 20.0"
    impact: "Developers reading code will hardcode wrong value; default fallback is wrong"
    fix: "Change point_value default/example to 2.0 throughout"
    status: FIXED  # 2026-04-28: docstring updated to 2.0 in T4

  - id: PY-BUG-002
    severity: HIGH
    name: live_trader_default_point_value_wrong
    description: "live_trader.py: config['orb'].get('point_value', 20.0) — wrong default for MNQ (should be 2.0)"
    source_file: "live_trader.py"
    source_line: "self._point_value: float = float(config[\"orb\"].get(\"point_value\", 20.0))"
    impact: "If point_value missing from config, all PnL calculations are 10x wrong"
    fix: "Change default from 20.0 to 2.0"
    status: FIXED  # 2026-04-28: default changed to 2.0 in T4

contracts:
  - id: XSYS-001
    name: point_value_agreement
    description: "C++ OrbConfig::point_value default and Python live_trader default must both equal 2.0 (MNQ)"
    cpp:
      source: "src/execution/orb_config.hpp"
      field: "OrbConfig::point_value"
      expected_default: 2.0
    python:
      source: "live_trader.py"
      expression: "config['orb'].get('point_value', 2.0)"
      current_default: 2.0
      expected_default: 2.0
    status: OK  # FIXED 2026-04-28 in T4

  - id: XSYS-002
    name: tick_value_agreement
    description: "C++ MNQ_TICK_VALUE and Python TICK_VALUE must agree on MNQ tick value = 0.50"
    cpp:
      source: "src/execution/orb_config.hpp"
      constant: "MNQ_TICK_VALUE"
      current_value: 0.50
      expected_value: 0.50
    python:
      source: "live_trader.py"
      derivation: "point_value * 0.25"
      expected_value: 0.50  # correct when point_value=2.0 from config
    status: OK  # FIXED 2026-04-28 — MNQ_TICK_VALUE constant added

  - id: XSYS-003
    name: symbol_agreement
    description: "Both systems must use MNQ as the trading symbol"
    cpp:
      source: "src/execution/orb_config.hpp"
      field: "OrbConfig::symbol"
      default: "MNQ"  # FIXED 2026-04-28
    python:
      source: "live_trader.py"
      field: "self._symbol"
      current_default: "MNQ"  # FIXED 2026-04-28
      live_config_value: "MNQ"
    config_source: "config/live_config.json"
    config_key: "symbol"
    config_value: "MNQ"
    status: OK  # FIXED 2026-04-28

  - id: XSYS-004
    name: orb_minutes_agreement
    description: "C++ OrbConfig::orb_minutes default=15; live_config.json orb_minutes=5 — config overrides default"
    cpp:
      source: "src/execution/orb_config.hpp"
      field: "OrbConfig::orb_minutes"
      default: 15
    config:
      source: "config/live_config.json"
      key: "orb_minutes"
      value: 5
    status: EXPECTED  # config intentionally overrides C++ default for live trading

  - id: XSYS-005
    name: point_value_config_path_agreement
    description: "Both C++ and Python must read point_value from the same config path"
    cpp:
      source: "src/execution/orb_config.hpp"
      read_via: "json_dbl()"
      config_key: "point_value"
      json_path: "orb_config.json"
      default: 2.0
    python:
      source: "live_trader.py"
      read_via: "config['orb'].get('point_value', 2.0)"
      json_path: "config/live_config.json → orb section"
      default: 2.0  # FIXED 2026-04-28

  - id: XSYS-006
    name: commission_agreement
    description: "Both systems must use $2.00/side commission for MNQ"
    cpp:
      source: "src/execution/orb_config.hpp"
      constant: "NQ_COMMISSION"
      value: 2.0
    python:
      source: "live_trader.py"
      note: "commission sourced from config, not hardcoded"
    expected: 2.0
    status: OK

  - id: XSYS-007
    name: tick_size_agreement
    description: "Both systems must use 0.25 tick size (same for NQ and MNQ)"
    cpp:
      source: "src/execution/orb_config.hpp"
      constant: "NQ_TICK_SIZE"
      value: 0.25
    python:
      source: "strategy/micro_orb.py"
      key: "tick_size"
      expected: 0.25
    status: OK

  - id: XSYS-008
    name: latency_logger_slippage_bug
    description: "Latency logger uses NQ_TICK_VALUE=5.0 to compute slippage_usd — produces 10x wrong values for MNQ"
    source_file: "src/execution/latency_logger.hpp"
    impact: "All slippage_usd values in latency log are 10x inflated — misleads post-trade analysis"
    expected_per_tick: 0.50
    current_per_tick: 0.50
    error_factor: 1.0
    status: FIXED  # 2026-04-28 — latency_logger.hpp now uses MNQ_TICK_VALUE

  - id: XSYS-009
    name: trade_route_not_simulator
    description: "C++ executor reads trade_route from live_config.json and passes it directly to Rithmic; 'simulator' means paper orders regardless of dry_run setting"
    cpp_reader: "src/execution/orb_config.hpp: c.trade_route = json_str(text, 'trade_route', ...)"
    config_file: "config/live_config.json"
    required_value: "Rithmic Order Routing"
    forbidden_value: "simulator"
    status: OK  # FIXED 2026-04-28 — BUG-14

  - id: XSYS-010
    name: risk_params_flat_match_prop_firm
    description: "C++ reads trailing_drawdown_cap, consistency_cap_pct, max_daily_trades as flat keys; they must exist and match prop_firm nested values"
    cpp_reader: "src/execution/orb_config.hpp lines 177, 184-185"
    invariants:
      - "flat trailing_drawdown_cap == prop_firm.trailing_drawdown_limit"
      - "flat consistency_cap_pct == prop_firm.consistency_rule_pct"
      - "flat max_daily_trades == prop_firm.max_daily_trades"
    status: OK  # FIXED 2026-04-28 — BUG-15 + BUG-16
