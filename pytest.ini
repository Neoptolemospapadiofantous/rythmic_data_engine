[pytest]
markers =
    feature_parity: tests that verify backtest and live feature vectors are identical (run in CI)
    orb_parity: tests that verify Python MicroORBStrategy and C++ OrbStrategy produce identical signals (run in CI)
    ml_comparison: tests that compare ML-on vs ML-off performance metrics for validation
    preflight: tests for go_live.py pre-flight gate logic and no_deploy lockfile management
    live_trader: tests for live_trader.py state machine, dry_run, SIGTERM, position reconciliation
    audit: tests for rithmic_engine build/source/schema/data integrity

# Paths searched for tests
testpaths = tests

# Default options: show extra test summary info for failures, errors, skipped
addopts =
    -v
    --tb=short
    --strict-markers

# CI parity suite — run with: pytest -m "feature_parity or orb_parity"
# Full suite — run with: pytest
# Fast subset (no DB) — run with: pytest -m "not (audit or live_trader)"
