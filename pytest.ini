[pytest]
markers =
    feature_parity: Feature computation parity contract tests — backtest vs live vectors must be identical
    orb_parity: C++/Python ORB signal parity tests — requires build/orb_strategy binary
    preflight: Pre-flight gate tests for go_live.py and no_deploy lockfile management
    live: Tests requiring a live Rithmic connection — excluded from CI with -m 'not live'
    fast: Unit tests with no I/O or subprocess calls; each must complete in <0.05s
    slow: Tests with subprocess calls, DB access, or network I/O; >0.1s expected
    cpp: Tests that require the C++ orb_strategy binary (build/orb_strategy)
    ml_comparison: Tests that compare ML-on vs ML-off performance metrics for validation
    live_trader: Tests for live_trader.py state machine, dry_run, SIGTERM, position reconciliation
    audit: Tests for rithmic_engine build/source/schema/data integrity

# Paths searched for tests (kill_test_suite is a first-class test module)
testpaths = tests scripts/kill_test_suite.py

# Ignore cache, build artifacts, and plain scripts that aren't pytest modules
norecursedirs = __pycache__ .pytest_cache build dist *.egg-info .git

# Default options:
#   -m 'not live'     — never block CI waiting for Rithmic
#   --strict-markers  — fail on unregistered marker names
#   --tb=short        — concise tracebacks
# Override from CLI:
#   pytest -m fast -q                    # pre-commit gate, <2s
#   pytest -m "feature_parity or orb_parity"  # CI parity suite
#   pytest -n auto -m "not live" -q      # parallel CI (requires pytest-xdist)
addopts =
    --tb=short
    --strict-markers
    -m "not live"

# Global timeout: any test exceeding 30s is considered hung.
# fast-marked tests get a tighter 2s budget via conftest.py.
timeout = 30
timeout_method = thread
